<footer class="footer-color text-center footer-text">
    <div class="container p-4">
        {% if not user.is_authenticated %}
            <section class="">
                <form action="#" method="post">
                    <div class="row d-flex justify-content-center">
                    {% csrf_token %}

                        <div class="col-auto">
                            <p class="pt-2">Subscribe for our sheik</p>
                        </div>

                        <div class="col-auto">
                            <input id="name" name="name" class="form-control" placeholder="Your Name"/>
                        </div>

                        <div class="col-auto">
                            <input id="email" name="email" type="email" class="form-control" placeholder="Email address"/>
                        </div>

                        <div class="col-auto">
                            <button type="submit" class="btn btncolor">
                                <i class="fa fa-arrow-circle-right fa-lg"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </section>
        {% endif %}
        <div class="row mobiledevice">
            <div class="col-lg-4 col-md-4 col-sm-4 text-left">
                <a href="/">
                    <h4>Quran Heaven</h4>
                </a>
            </div>
            <div class="col-lg-4 col-md-5 col-sm-4 text-left">
                <a href="{%url 'contact'%}"><h4>Contact Us</h4></a>
            </div>
            <div class="col-lg-4 col-md-4 col-sm-4 text-left">
                <a href="{%url 'about'%}">
                    <h4>About</h4>
                </a>
                
            </div>
            {% comment %} <div class="col-lg-4 col-md-4 col-sm-5 text-right">
                <a href="{%url 'donate'%}">
                    <h4>Donate us</h4>
                </a>
                
            </div> {% endcomment %}
        </div>

    </div>
    <div class="text-center p-3" style="background-color: rgba(0, 0, 0, 0.2);">
        <p>© {% now "Y" %} Copyright:
            <a href="https://www.linkedin.com/in/abdallh-shref-b91b92329/">Sonic</a>
        </p>
    </div>
</footer>
